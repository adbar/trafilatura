# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.python-version }}, ${{ matrix.variant }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            variant: minimal
            install-full: "false"
            proxy-test: "false"
            run-lint: "false"
            run-mypy: "false"
            upload-coverage: "false"
          - python-version: "3.13"
            variant: full
            install-full: "true"
            proxy-test: "true"
            run-lint: "true"
            run-mypy: "true"
            upload-coverage: "true"
    services:
      socks_proxy:
        image: serjs/go-socks5-proxy
        env:
          REQUIRE_AUTH: "false"
        ports:
          - 1080:1080
      socks_proxy_auth:
        image: serjs/go-socks5-proxy
        env:
          REQUIRE_AUTH: "true"
          PROXY_USER: user
          PROXY_PASSWORD: pass
        ports:
          - 1081:1080

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install packages required by pycurl
        if: ${{ matrix.install-full == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-gnutls-dev libgnutls28-dev

      - name: Install full dependencies
        if: ${{ matrix.install-full == 'true' }}
        run: python -m pip install -e ".[all]"

      - name: Lint with flake8
        if: ${{ matrix.run-lint == 'true' }}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type checking
        if: ${{ matrix.run-mypy == 'true' }}
        run: mypy -p trafilatura

      - name: Test with pytest
        run: python -m pytest --cov=./ --cov-report=xml
        env:
          PROXY_TEST: ${{ matrix.proxy-test }}

      - name: Upload coverage to Codecov
        if: ${{ matrix.upload-coverage == 'true' && secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
          verbose: true
